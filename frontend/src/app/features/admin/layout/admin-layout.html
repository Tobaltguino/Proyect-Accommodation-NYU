<main class="admin-layout">
  <aside class="dashboard-sidebar">
    <section class="sidebar-brand">
      <img src="/assets/NYU-Logo.png" alt="Logo Universidad de New York" />
      <div>
        <strong>Housing Portal</strong>
        <span>Admin Management</span>
      </div>
    </section>

    <section class="sidebar-profile">
      <strong>{{ currentUser?.fullName ?? 'Administrador' }}</strong>
      <span>RUT {{ currentUser?.rut ?? 'Sin RUT' }}</span>
      <small>Panel de Control</small>
    </section>

    <nav class="sidebar-nav" aria-label="Navegacion admin">
      <a routerLink="/admin/home" routerLinkActive="active" class="nav-item">
        <i class="pi pi-home"></i>
        <span>Inicio</span>
      </a>
      
      <a routerLink="/admin/requests" routerLinkActive="active" class="nav-item">
        <i class="pi pi-inbox"></i>
        <span>Solicitudes</span>
      </a>
      
      <a routerLink="/admin/assignments" routerLinkActive="active" class="nav-item">
        <i class="pi pi-users"></i>
        <span>Asignaciones</span>
      </a>
      
      <a routerLink="/admin/incidents" routerLinkActive="active" class="nav-item">
        <i class="pi pi-exclamation-triangle"></i>
        <span>Incidencias</span>
      </a>
      
      <a routerLink="/admin/infrastructure" routerLinkActive="active" class="nav-item">
        <i class="pi pi-building"></i>
        <span>Infraestructura</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="logout-btn" (click)="logout()">
        <i class="pi pi-sign-out"></i>
        <span>Cerrar sesion</span>
      </button>
    </div>
  </aside>

  <section class="dashboard-main-container">
    <router-outlet></router-outlet>
  </section>
</main>
